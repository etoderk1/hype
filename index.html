    <style>
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; }
        
        :root {
            --bg: #F0EEE9;
            --surface: #FFFFFF;
            --surface2: #F7F6F2;
            --border: rgba(0,0,0,0.07);
            --text: #1A1A1A;
            --muted: #8A8680;
            --accent: #1A1A1A;
            --accent-fg: #FFFFFF;
        }
        
        .dark {
            --bg: #0E0E10;
            --surface: #1A1A1E;
            --surface2: #141416;
            --border: rgba(255,255,255,0.07);
            --text: #F0EEE9;
            --muted: #6E6B65;
            --accent: #F0EEE9;
            --accent-fg: #0E0E10;
        }

        body { background: var(--bg); color: var(--text); }

        .glass {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .dark .glass {
            background: rgba(20,20,22,0.82);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .glass-dark {
            background: rgba(10,10,12,0.75);
            backdrop-filter: blur(32px) saturate(1.5);
            -webkit-backdrop-filter: blur(32px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.03);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 16px 48px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
        }

        .pill-btn {
            border-radius: 100px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: -0.01em;
            transition: all 0.2s ease;
        }
        
        .pill-btn:hover { transform: translateY(-1px); }
        .pill-btn:active { transform: translateY(0px); }

        .btn-primary {
            background: var(--accent);
            color: var(--accent-fg);
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }
        
        .btn-primary:active { transform: translateY(0); }

        .img-rounded { border-radius: 16px; overflow: hidden; }
        .img-rounded-lg { border-radius: 24px; overflow: hidden; }
        .img-rounded-xl { border-radius: 32px; overflow: hidden; }

        .product-img {
            border-radius: 16px;
            overflow: hidden;
            background: var(--surface2);
        }

        @keyframes float-up {
            from { opacity: 0; transform: translateY(16px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .animate-float-up { animation: float-up 0.4s ease forwards; }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .loading-screen {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Icon containers */
        .icon-wrap {
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        
        .icon-wrap-round {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        /* Smooth scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 100px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

        /* Tag badge */
        .badge {
            border-radius: 100px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.02em;
            padding: 4px 10px;
        }

        /* Modal slide up on mobile */
        .modal-sheet {
            border-radius: 28px 28px 0 0;
        }

        @media (min-width: 640px) {
            .modal-sheet {
                border-radius: 24px;
            }
        }

        /* Gradient mesh bg */
        .mesh-bg {
            background: 
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,220,180,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(180,210,255,0.2) 0%, transparent 60%),
                var(--bg);
        }
        
        .dark .mesh-bg {
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80,60,120,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(40,80,120,0.12) 0%, transparent 60%),
                var(--bg);
        }

        /* Toggle switch */
        .toggle {
            width: 48px; height: 28px;
            border-radius: 100px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-thumb {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 3px; left: 3px;
            transition: transform 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .toggle.on .toggle-thumb { transform: translateX(20px); }

        /* Quantity control */
        .qty-btn {
            width: 32px; height: 32px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface2);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.15s;
            color: var(--text);
        }
        .qty-btn:hover { background: var(--accent); color: var(--accent-fg); }

        /* Price tag */
        .price-tag {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            letter-spacing: -0.03em;
        }
    </style>
</head>

        // ───── AUTH MODAL ─────
        function AuthModal({ isOpen, onClose, onLogin }) {
          const [step, setStep] = useState(1);
          const [phone, setPhone] = useState('');
          const [code, setCode] = useState('');
          const [loading, setLoading] = useState(false);

          useEffect(() => { if (isOpen) { setStep(1); setPhone(''); setCode(''); } }, [isOpen]);
          if (!isOpen) return null;

          const sendCode = () => {
            if (phone.length < 10) return;
            setLoading(true);
            setTimeout(() => { setLoading(false); setStep(2); }, 1000);
          };
          const verify = () => {
            if (code.length < 4) return;
            setLoading(true);
            setTimeout(() => { setLoading(false); onLogin(); }, 1000);
          };

          return (
            <div style={{ position: 'fixed', inset: 0, zIndex: 90, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px' }}>
              <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(12px)' }} onClick={onClose} />
              <motion.div initial={{ opacity: 0, scale: 0.94, y: 16 }} animate={{ opacity: 1, scale: 1, y: 0 }}
                style={{ position: 'relative', width: '100%', maxWidth: '400px', background: 'var(--surface)', borderRadius: '28px', padding: '36px', border: '1px solid var(--border)', boxShadow: '0 40px 100px rgba(0,0,0,0.25)' }}
              >
                <button onClick={onClose} style={{ position: 'absolute', top: '20px', right: '20px', width: '36px', height: '36px', borderRadius: '10px', background: 'var(--surface2)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--muted)', border: '1px solid var(--border)' }}><X size={16} /></button>
                
                <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                  <div style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: '32px', letterSpacing: '-0.05em', color: 'var(--text)', marginBottom: '8px' }}>HYPE</div>
                  <h2 style={{ fontFamily: 'Syne', fontWeight: 700, fontSize: '20px', letterSpacing: '-0.02em', color: 'var(--text)', marginBottom: '6px' }}>Войти в аккаунт</h2>
                  <p style={{ fontSize: '13px', color: 'var(--muted)', fontWeight: 500 }}>{step === 1 ? 'Введите номер телефона' : `Код отправлен на ${phone}`}</p>
                </div>

                {step === 1 ? (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    <input type="tel" placeholder="+7 (999) 000-00-00" value={phone}
                      onChange={e => {
                        let v = e.target.value.replace(/\D/g,'');
                        if(v.startsWith('7')||v.startsWith('8')) v=v.slice(1);
                        let f=v.length>0?'+7':'';
                        if(v.length>0) f+=' ('+v.substring(0,3);
                        if(v.length>=4) f+=') '+v.substring(3,6);
                        if(v.length>=7) f+='-'+v.substring(6,8);
                        if(v.length>=9) f+='-'+v.substring(8,10);
                        setPhone(f);
                      }}
                      maxLength={18}
                      style={{ width:'100%', padding:'16px', borderRadius:'16px', background:'var(--surface2)', border:'1px solid var(--border)', outline:'none', fontSize:'16px', fontWeight:600, textAlign:'center', letterSpacing:'0.06em', color:'var(--text)', fontFamily:'DM Sans' }}
                    />
                    <button onClick={sendCode} disabled={loading||phone.length<18}
                      className="btn-primary"
                      style={{ width:'100%', padding:'16px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px' }}
                    >
                      {loading ? <Loader2 size={20} style={{ animation: 'spin 1s linear infinite' }} /> : 'Получить код'}
                    </button>
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    <input type="text" placeholder="0000" maxLength={4} value={code}
                      onChange={e => setCode(e.target.value.replace(/\D/g,''))}
                      style={{ width:'100%', padding:'16px', borderRadius:'16px', background:'var(--surface2)', border:'1px solid var(--border)', outline:'none', fontSize:'28px', fontWeight:800, textAlign:'center', letterSpacing:'0.2em', color:'var(--text)', fontFamily:'Syne' }}
                    />
                    <button onClick={verify} disabled={loading||code.length<4}
                      className="btn-primary"
                      style={{ width:'100%', padding:'16px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px' }}
                    >
                      {loading ? <Loader2 size={20} style={{ animation: 'spin 1s linear infinite' }} /> : 'Подтвердить'}
                    </button>
                    <button onClick={() => setStep(1)} style={{ fontSize:'13px', color:'var(--muted)', padding:'8px', fontWeight:500, background:'none', border:'none', cursor:'pointer' }}>Изменить номер</button>
                  </div>
                )}
              </motion.div>
            </div>
          );
        }

            showToast('Добавлено в корзину ✓');
          };

          const updateQty = (id, delta) => setCart(p => p.map(i => i.product.id === id ? { ...i, quantity: Math.max(1, i.quantity + delta) } : i));
          const removeFromCart = (id) => setCart(p => p.filter(i => i.product.id !== id));

          const toggleFav = (id) => {
            setFavorites(prev => {
              const isFav = prev.includes(id);
              showToast(isFav ? 'Удалено из избранного' : 'Добавлено в избранное ♥', 'info');
              return isFav ? prev.filter(f => f !== id) : [...prev, id];
            });
          };

          const checkout = () => {
            if (!isLoggedIn) { setCartOpen(false); setAuthOpen(true); return; }
            if (!city) { setCityOpen(true); return; }
            setPaymentOpen(true);
          };

          const completePayment = () => {
            const total = cart.reduce((s,i) => s + i.product.price * i.quantity, 0);
            const d = new Date(); d.setDate(d.getDate() + (city === 'Москва' ? 1 : 4));
            const ds = d.toLocaleDateString('ru-RU', { day:'numeric', month:'long' });
            const now = new Date();
            const newOrder = {
              id: Math.floor(Math.random() * 1000000),
              date: now.toLocaleDateString('ru-RU'),
              items: [...cart], total, status: 'В пути', city, deliveryDate: ds,
              trackingSteps: [
                { title: 'Оформлен', description: 'Оплата прошла', date: now.toLocaleDateString('ru-RU'), completed: true },
                { title: 'В пути', description: 'Сортировочный центр', completed: true },
                { title: 'В городе', description: city || 'ваш город', completed: false },
                { title: 'Доставка', description: 'Ожидайте уведомления', completed: false },
              ]
            };
            setOrders(p => [newOrder, ...p]);
            setCart([]);
            setPaymentOpen(false);
            setCartOpen(false);
            showToast('Заказ оформлен! 🎉');
          };

          const filtered = PRODUCTS.filter(p => {
            const catOk = activeCategory === 'Все' || p.category === activeCategory;
            const searchOk = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.description.toLowerCase().includes(searchQuery.toLowerCase());
            return catOk && searchOk;
          });

          return (
            <div style={{ minHeight: '100vh' }}>
              <ToastContainer toasts={toasts} />

              <Navbar
                city={city} onOpenCity={() => setCityOpen(true)}
                onOpenCart={() => setCartOpen(true)} onOpenAuth={() => setAuthOpen(true)} onOpenProfile={() => setProfileOpen(true)}
                isLoggedIn={isLoggedIn} cartCount={cart.reduce((s,i) => s + i.quantity, 0)}
                onNavigate={setPage} searchQuery={searchQuery} setSearchQuery={setSearchQuery}
              />

              {page === 'home' ? (
                <main style={{ paddingTop: '80px' }}>
                  {/* Hero */}
                  <section style={{ padding: '16px 16px 0', maxWidth: '1280px', margin: '0 auto' }}>
                    <div style={{ position: 'relative', borderRadius: '28px', overflow: 'hidden', aspectRatio: '21/9', minHeight: '280px', background: '#111' }}>
                    <div style={{ position:'absolute',inset:0,width:'100%',height:'100%',opacity:1 }} dangerouslySetInnerHTML={{ __html: HERO_SVG }} />
                      <div style={{ position:'absolute',inset:0,background:'linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 60%, transparent 100%)', display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',padding:'40px 24px',textAlign:'center' }}>
                        <motion.h1 initial={{ opacity:0,y:24 }} animate={{ opacity:1,y:0 }} transition={{ delay:0.1 }}
                          style={{ fontFamily:'Syne',fontWeight:800,fontSize:'clamp(36px,6vw,80px)',letterSpacing:'-0.04em',color:'white',lineHeight:1.05,marginBottom:'12px' }}
                        >
                          НОВАЯ КОЛЛЕКЦИЯ.
                        </motion.h1>
                        <motion.p initial={{ opacity:0,y:16 }} animate={{ opacity:1,y:0 }} transition={{ delay:0.2 }}
                          style={{ color:'rgba(255,255,255,0.8)',fontSize:'clamp(14px,1.5vw,18px)',fontWeight:500,marginBottom:'24px' }}
                        >
                          Эксклюзивный дроп. Лимитированный тираж.
                        </motion.p>
                        <motion.button initial={{ opacity:0,y:12 }} animate={{ opacity:1,y:0 }} transition={{ delay:0.3 }}
                          style={{ padding:'14px 32px',background:'white',color:'#111',borderRadius:'100px',fontFamily:'Syne',fontWeight:700,fontSize:'15px',cursor:'pointer',boxShadow:'0 8px 32px rgba(0,0,0,0.3)',border:'none',transition:'transform 0.2s' }}
                          className="hover:scale-105"
                        >
                          Смотреть коллекцию
                        </motion.button>
                      </div>
                    </div>
                  </section>

                  {/* Categories */}
                  <div style={{ padding: '20px 16px 0', maxWidth: '1280px', margin: '0 auto' }}>
                    <div style={{ display: 'flex', gap: '8px', overflowX: 'auto', scrollbarWidth: 'none' }} className="no-scrollbar">
                      {CATEGORIES.map(cat => (
                        <button key={cat.id} onClick={() => setActiveCategory(cat.name)}
                          className="pill-btn"
                          style={{ padding: '10px 18px', fontSize: '13px', whiteSpace: 'nowrap', flexShrink: 0, background: activeCategory === cat.name ? 'var(--accent)' : 'var(--surface)', color: activeCategory === cat.name ? 'var(--accent-fg)' : 'var(--text)', border: '1px solid var(--border)', boxShadow: activeCategory === cat.name ? '0 4px 16px rgba(0,0,0,0.15)' : 'none', display: 'flex', alignItems: 'center', gap: '6px' }}
                        >
                          <span>{cat.icon}</span>
                          {cat.name}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Products */}
                  <section style={{ padding: '24px 16px 40px', maxWidth: '1280px', margin: '0 auto' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                      <h2 style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: '28px', letterSpacing: '-0.03em', color: 'var(--text)' }}>
                        {searchQuery ? `Поиск: "${searchQuery}"` : 'Тренды сезона'}
                      </h2>
                      <span style={{ fontSize: '13px', color: 'var(--muted)', fontWeight: 600 }}>{filtered.length} товаров</span>
                    </div>

                    {filtered.length === 0 ? (
                      <div style={{ padding: '80px 0', textAlign: 'center', color: 'var(--muted)' }}>
                        <Search size={48} style={{ margin: '0 auto 16px', opacity: 0.2 }} />
                        <p style={{ fontFamily: 'Syne', fontWeight: 700, fontSize: '18px', marginBottom: '8px' }}>Ничего не найдено</p>
                        <p style={{ fontSize: '14px', fontWeight: 500 }}>Попробуйте изменить запрос</p>
                      </div>
                    ) : (
                      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: '16px' }}>
                        {filtered.map((p, i) => (
                          <ProductCard key={p.id} product={p} index={i}
                            onOpen={setSelectedProduct}
                            onAddToCart={addToCart}
                            isFavorite={favorites.includes(p.id)}
                            onToggleFavorite={toggleFav}
                          />
                        ))}
                      </div>
                    )}
                  </section>
                </main>
              ) : (
                <InfoPage
                  title={PAGES_CONTENT[page]?.title}
                  content={PAGES_CONTENT[page]?.content}
                  onBack={() => { window.scrollTo({ top: 0, behavior: 'smooth' }); setPage('home'); }}
                />
              )}

              <Footer onNavigate={setPage} />

              {/* Modals */}
              <CityModal isOpen={isCityOpen} onClose={() => setCityOpen(false)} currentCity={city} onSelectCity={setCity} />
              <CartModal isOpen={isCartOpen} onClose={() => setCartOpen(false)} cart={cart} updateQuantity={updateQty} removeItem={removeFromCart} city={city} onCheckout={checkout} />
              <PaymentModal isOpen={isPaymentOpen} onClose={() => setPaymentOpen(false)} total={cart.reduce((s,i) => s+i.product.price*i.quantity, 0)} onComplete={completePayment} />
              <ProductModal product={selectedProduct} isOpen={!!selectedProduct} onClose={() => setSelectedProduct(null)}
                onAddToCart={addToCart} isFavorite={selectedProduct ? favorites.includes(selectedProduct.id) : false}
                onToggleFavorite={toggleFav} city={city} onCheckout={checkout} showToast={showToast}
              />
              <AuthModal isOpen={isAuthOpen} onClose={() => setAuthOpen(false)} onLogin={() => { setLoggedIn(true); setAuthOpen(false); showToast('Добро пожаловать!'); }} />
              <AnimatePresence>
                {isProfileOpen && <ProfileView orders={orders} favorites={favorites}
                  onLogout={() => { setLoggedIn(false); setProfileOpen(false); showToast('Вы вышли из аккаунта', 'info'); }}
                  onClose={() => setProfileOpen(false)}
                  onRemoveFavorite={toggleFav}
                  showToast={showToast}
                />}
              </AnimatePresence>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StrictMode><App /></StrictMode>);
        
        setTimeout(() => {
          const loader = document.querySelector('.loading-screen');
          if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }
        }, 600);
    </script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
